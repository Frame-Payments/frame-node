name: Node SDK CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run fmt:check

  # Unit tests run via ts-jest against src/, so they don't need the build
  # and can run on every supported Node version (including 20).
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # tsdown requires Node 22.18+, so the build runs on 22 only.
  build:
    needs: [format, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist

  # Verify the built output (targeted at node20) actually loads on each
  # supported Node version — this is tsdown's recommended workflow for
  # confirming a lower-than-build-time runtime is supported.
  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install runtime dependencies
        run: npm ci --omit=dev

      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Load CommonJS build
        run: node -e "require('./dist/index.cjs'); console.log('cjs OK')"

      - name: Load ESM build
        run: node --input-type=module -e "import('./dist/index.mjs').then(() => console.log('esm OK'))"
